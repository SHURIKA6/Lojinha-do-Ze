# authorsip verif
name = "lojinha-do-ze-backend"
main = "src/server.js"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# DATABASE_URL should be set as a secret in Cloudflare Dashboard:
# npx wrangler secret put DATABASE_URL

# GEMINI_API_KEY should be set as a secret in Cloudflare Dashboard:
# npx wrangler secret put GEMINI_API_KEY

# SEC-01: KV namespace para rate limiting distribuído entre edge nodes.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a7ec24ab1399417d819b1df96d90c51d"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "lojinha-do-ze-images"


