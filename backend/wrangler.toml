name = "lojinha-do-ze-api"
main = "src/server.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Secrets should be configured via Cloudflare dashboard or wrangler secret put
# DATABASE_URL = ""
# JWT_SECRET = ""
# MERCADO_PAGO_ACCESS_TOKEN = ""
# MERCADO_PAGO_CLIENT_ID = ""
# MERCADO_PAGO_CLIENT_SECRET = ""
# GEMINI_API_KEY = ""

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[durable_objects]
bindings = [
  { name = "NOTIFICATIONS_DO", class_name = "NotificationDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NotificationDO"]