name = "lojinha-do-ze-backend"
main = "src/server.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://lojinha-do-ze.vercel.app"
ALLOWED_ORIGINS = "https://lojinha-do-ze.vercel.app,http://localhost:3000"
TRUST_PROXY = "true"

# Nota: DATABASE_URL e JWT_SECRET devem ser configurados como Secrets no dashboard da Cloudflare.
# Para desenvolvimento local, o Wrangler usa o arquivo .dev.vars automaticamente.
# DATABASE_URL = ""
# JWT_SECRET = ""
# MERCADO_PAGO_ACCESS_TOKEN = ""
# GEMINI_API_KEY = ""