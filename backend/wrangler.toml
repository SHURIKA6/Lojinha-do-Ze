name = "lojinha-do-ze-backend"
main = "src/server.js"
compatibility_date = "2024-04-03"
node_compat = true

[vars]
# DATABASE_URL and JWT_SECRET should be set as secrets in Cloudflare Dashboard:
# npx wrangler secret put DATABASE_URL
# npx wrangler secret put JWT_SECRET

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "lojinha-do-ze-images"


