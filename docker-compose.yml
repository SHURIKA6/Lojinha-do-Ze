version: '3.8'

services:
  # 🐘 Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: lojinha-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: lojinha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d lojinha"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🔍 Adminer (Interface para o Banco)
  adminer:
    image: adminer:latest
    container_name: lojinha-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # ⚙️ Backend (Workers)
  backend:
    image: node:20-alpine
    container_name: lojinha-backend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8787:8787"
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/lojinha
    command: sh -c "npm install && npm run dev --workspace=backend -- --ip 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy

  # 🌐 Frontend (Next.js)
  frontend:
    image: node:20-alpine
    container_name: lojinha-frontend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/.next
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8787
      - NEXT_PUBLIC_API_URL=http://localhost:8787
    command: sh -c "npm install && npm run dev --workspace=frontend -- -H 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:
