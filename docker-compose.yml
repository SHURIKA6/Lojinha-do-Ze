version: '3.8'

services:
  # 🐘 Banco de Dados PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: lojinha-db
    restart: always
    environment:
      POSTGRES_USER: ze_user
      POSTGRES_PASSWORD: ze_password
      POSTGRES_DB: lojinha_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ze_user -d lojinha_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🔍 Adminer (Interface para o Banco) - Acesse em localhost:8080
  adminer:
    image: adminer:latest
    container_name: lojinha-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # ⚙️ Backend (Workers)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lojinha-backend
    restart: always
    ports:
      - "8787:8787"
    environment:
      - DATABASE_URL=postgresql://ze_user:ze_password@postgres:5432/lojinha_db?sslmode=disable
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # 🌐 Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lojinha-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8787/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
